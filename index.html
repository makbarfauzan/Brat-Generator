<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Generator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
            color: white;
        }

        .controls {
            width: min(950px, 95vw);
            display: grid;
            grid-template-columns: 1fr 180px 140px 160px;
            gap: 10px;
        }

        input[type=text],
        select,
        button {
            height: 48px;
            padding: 0 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }

        input[type=color] {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        button {
            cursor: pointer;
            font-weight: bold;
            background: white;
            color: #111;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: #e0e0e0;
        }

        button:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr 1fr;
            }

            #textInput {
                grid-column: span 2;
            }

            #downloadBtn {
                grid-column: span 2;
            }
        }

        #cover {
            width: min(700px, 90vw);
            aspect-ratio: 1;
            background: #FFFFFF;
            position: relative;
            overflow: hidden;
        }

        #text {
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            max-width: 82%;
            line-height: .92;
            word-break: break-word;
            text-transform: lowercase;
            font-family:
                "Arial Narrow",
                Arial,
                Helvetica,
                sans-serif;
            font-weight: 500;
            color: #111;
            filter: blur(1.8px);
            text-align: left;
        }

        .info {
            opacity: .7;
        }
    </style>
</head>

<body>

    <div class="controls">

        <input id="textInput" type="text" value="brat" placeholder="Masukkan teks...">

        <select id="alignSelect">
            <option value="left" selected>Rata Kiri</option>
            <option value="center">Rata Tengah</option>
            <option value="right">Rata Kanan</option>
        </select>

        <input id="bgColor" type="color" value="#FFFFFF">

        <button id="downloadBtn">
            Download PNG
        </button>

    </div>

    <div id="cover">
        <div id="text">brat</div>
    </div>


    <script>

        const cover = document.getElementById("cover");
        const text = document.getElementById("text");
        const input = document.getElementById("textInput");
        const bgColor = document.getElementById("bgColor");
        const alignSelect = document.getElementById("alignSelect");

        let currentX = 10;
        let currentY = 50;

        function fitText() {

            let size = cover.clientWidth * 0.22;

            text.style.fontSize = size + "px";

            while (
                (
                    text.scrollWidth > cover.clientWidth * 0.82 ||
                    text.scrollHeight > cover.clientHeight * 0.82
                )
                && size > 20
            ) {
                size -= 2;
                text.style.fontSize = size + "px";
            }

        }

        function updateText() {
            text.textContent = input.value.toLowerCase() || " ";
            fitText();
        }

        function updateAlignment() {

            const align = alignSelect.value;

            text.style.textAlign = align;

            if (align === "left") {
                currentX = 10;
                text.style.left = "10%";
                text.style.transform = "translateY(-50%)";
            }

            if (align === "center") {
                currentX = 50;
                text.style.left = "50%";
                text.style.transform = "translate(-50%,-50%)";
            }

            if (align === "right") {
                currentX = 90;
                text.style.left = "90%";
                text.style.transform = "translate(-100%,-50%)";
            }

        }

        input.addEventListener("input", updateText);

        bgColor.addEventListener("input", () => {
            cover.style.background = bgColor.value;
        });

        alignSelect.addEventListener(
            "change",
            updateAlignment
        );

        window.addEventListener(
            "resize",
            fitText
        );

        updateAlignment();
        fitText();


        document
            .getElementById("downloadBtn")
            .addEventListener("click", downloadPNG);

        function downloadPNG() {

            const size = 3000;

            const canvas = document.createElement("canvas");

            canvas.width = size;
            canvas.height = size;

            const ctx = canvas.getContext("2d");

            ctx.fillStyle =
                getComputedStyle(cover).backgroundColor;

            ctx.fillRect(0, 0, size, size);

            const scale = size / cover.clientWidth;
            const fontSize =
                parseFloat(
                    getComputedStyle(text).fontSize
                )
                * scale;

            const blurVal = 1.8 * scale;
            ctx.filter = `blur(${blurVal}px)`;
            ctx.fillStyle = "#111";

            ctx.font =
                fontSize +
                "px Arial Narrow, Arial";

            ctx.textBaseline = "middle";
            ctx.textAlign = alignSelect.value;

            let x = size * 0.5;

            if (alignSelect.value === "left") {
                x = size * 0.1;
            }

            if (alignSelect.value === "right") {
                x = size * 0.9;
            }

            const y = size * (currentY / 100);

            const words = text.textContent.split(" ");

            const lines = [];
            let line = "";

            const maxWidth = size * 0.8;

            for (const word of words) {

                const test = line
                    ? line + " " + word
                    : word;

                if (
                    ctx.measureText(test).width
                    > maxWidth
                ) {
                    if (line) lines.push(line);
                    line = word;
                } else {
                    line = test;
                }

            }

            if (line) lines.push(line);

            const lineHeight =
                fontSize * 0.92;

            const startYPos =
                y -
                (
                    (lines.length - 1)
                    * lineHeight
                ) / 2;

            lines.forEach((l, i) => {

                ctx.fillText(
                    l,
                    x,
                    startYPos + (i * lineHeight)
                );

            });

            const link =
                document.createElement("a");

            const fileName =
                (text.textContent || "cover")
                    .trim()
                    .replace(/[<>:"/\\|?*]+/g, "")
                    .replace(/\s+/g, "-")
                    .substring(0, 100);

            link.download = fileName + ".png";
            link.href =
                canvas.toDataURL("image/png");

            link.click();

        }

    </script>

</body>

</html>
